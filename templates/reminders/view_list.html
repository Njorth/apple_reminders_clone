{% extends "base.html" %}

{% block content %}
<section class="max-w-md p-2 mx-auto">
	<h1 class="font-bold text-2xl text-primary mb-1">{{ list.name }}</h1>

	<ul class="list bg-base-100 rounded-box shadow-md">
		{% for reminder in reminders %}
		<li class="list-row items-center p-2">
			<div>
				<input type="checkbox" checked="checked" class="checkbox checkbox-sm checkbox-primary" />
			</div>
			<div>
				{{ reminder.title }}
			</div>
		</li>
		{% endfor %}
	</ul>
</section>

{% endblock content %}
