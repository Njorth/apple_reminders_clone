{% extends "base.html" %}

{% block content %}

<div
	class=" backdrop-blur-lg z-1 fixed top-0 left-1/2 -translate-x-1/2 w-full min-w-[300px] max-w-sm p-2 flex justify-end">
	<div class="dropdown dropdown-end">
		<div tabindex="0" role="button" class="cursor-pointer">
			<svg class="w-5 h-5 fill-primary" viewBox="0 0 24.00 24.00" xmlns="http://www.w3.org/2000/svg">
				<g id="SVGRepo_bgCarrier" stroke-width="0"></g>
				<g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
				<g id="SVGRepo_iconCarrier">
					<path
						d="M17.5 14a1.5 1.5 0 1 1 1.5-1.5 1.502 1.502 0 0 1-1.5 1.5zM14 12.5a1.5 1.5 0 1 0-1.5 1.5 1.502 1.502 0 0 0 1.5-1.5zm-5 0A1.5 1.5 0 1 0 7.5 14 1.502 1.502 0 0 0 9 12.5zm13.8 0A10.3 10.3 0 1 1 12.5 2.2a10.297 10.297 0 0 1 10.3 10.3zm-1 0a9.3 9.3 0 1 0-9.3 9.3 9.31 9.31 0 0 0 9.3-9.3z">
					</path>
					<path fill="none" d="M0 0h24v24H0z"></path>
				</g>
			</svg>
		</div>
		<ul tabindex="-1" class="dropdown-content menu menu-sm text-base rounded-box z-1 w-52 p-1 shadow-sm bg-base-100">
			<li class="border-b border-base-content/5"><a>Edit Lists</a></li>
			<li><a>Templates</a></li>
		</ul>
	</div>


</div>

<section class="max-w-sm mx-auto p-2 mt-10 mb-10">

	<h1 class="font-semibold text-lg mb-1">My Lists</h1>

	<ul class="list bg-base-100 rounded-box shadow-md">
		{% for list in lists %}
		<li>
			<a href="{% url 'reminders:view_list' pk=list.pk %}" class="list-row items-center p-2">
				<div class="badge badge-{{ list.colour }} badge-xs rounded-full"></div>
				<div>
					{{ list.name }}
				</div>
				<div class="flex items-center gap-2">
					<span>
						{{ list.reminder_count }}
					</span>
					<svg class="w-3 h-3" viewBox="0 0 1024 1024" class="icon" version="1.1" xmlns="http://www.w3.org/2000/svg"
						class="fill-base-content/50">
						<g id="SVGRepo_bgCarrier" stroke-width="0"></g>
						<g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
						<g id="SVGRepo_iconCarrier">
							<path d="M256 120.768L306.432 64 768 512l-461.568 448L256 903.232 659.072 512z"
								class="fill-base-content/50"></path>
						</g>
					</svg>
				</div>

			</a>
		</li>
		{% endfor %}
	</ul>
</section>

<div
	class="backdrop-blur-lg fixed bottom-0 left-1/2 -translate-x-1/2 w-full min-w-[300px] max-w-sm flex justify-between p-2">
	<a class="text-primary font-semibold flex items-center gap-1">



		<svg class="w-5 h-5" viewBox="0 0 24.00 24.00" fill="none" xmlns="http://www.w3.org/2000/svg">
			<g id="SVGRepo_bgCarrier" stroke-width="0" transform="">
				<rect x="0" y="0" width="24.00" height="24.00" rx="12" strokewidth="0" class="fill-primary"></rect>
			</g>
			<g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC"
				stroke-width="0.24000000000000005"></g>
			<g id="SVGRepo_iconCarrier">
				<path d="M7 12L12 12M12 12L17 12M12 12V7M12 12L12 17" stroke="#000000" stroke-width="2" stroke-linecap="round"
					stroke-linejoin="round"></path>
			</g>
		</svg>
		<span>New Reminder</span>
	</a>
	<a class="text-primary" href="{% url 'reminders:add_list' %}">Add List</a>
</div>
{% endblock content %}
